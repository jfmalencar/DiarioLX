name: Publish images

# Builds the application images and publishes them to the GitHub Container
# Registry (GHCR) so the production VM only has to pull them (never build).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: jfmalencar

jobs:
  build-push:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      # extractUberJar (via assemble) produces modules/host/build/dependency,
      # which the JVM Dockerfile copies as its layered application content.
      # A .env file must exist because the test task is configured at
      # configuration time and reads it.
      - name: Build Spring Boot layered artifact
        working-directory: code/jvm
        run: |
          chmod +x gradlew
          cp .env.example .env
          ./gradlew :host:extractUberJar

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BuildKit builder that supports the GitHub Actions layer cache backend.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push JVM image
        uses: docker/build-push-action@v6
        with:
          context: code/jvm/modules/host
          file: code/jvm/modules/host/tests/Dockerfile-jvm
          push: true
          cache-from: type=gha,scope=jvm
          cache-to: type=gha,mode=max,scope=jvm
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-jvm:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-jvm:latest

      - name: Build and push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: code
          file: code/Dockerfile-nginx
          push: true
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-nginx:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-nginx:latest

      - name: Build and push Postgres image
        uses: docker/build-push-action@v6
        with:
          context: code/jvm/modules/repository-jdbi
          file: code/jvm/modules/host/tests/Dockerfile-postgres
          push: true
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-postgres:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diariolx-postgres:latest
