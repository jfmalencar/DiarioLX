events {
  worker_connections 1024;
}

http {
  upstream jvm-dynamic {
    server diariolx-jvm-dynamic:8180 max_fails=3 fail_timeout=10s;
  }

  server {
    listen        8180;

    location / {
      proxy_pass http://jvm-dynamic;
      proxy_buffering off;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout http_500;
    }
  }
}