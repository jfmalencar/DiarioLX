events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  client_max_body_size 2G;

  # API cache
  proxy_cache_path /var/cache/nginx/api
    levels=1:2
    keys_zone=api_cache:100m
    max_size=2g
    inactive=10m
    use_temp_path=off;

  # Media cache
  proxy_cache_path /var/cache/nginx/media
    levels=1:2
    keys_zone=media_cache:100m
    max_size=20g
    inactive=30d
    use_temp_path=off;

  upstream jvm-dynamic {
    server diariolx-jvm-dynamic:8180;
  }

  upstream seaweed-s3 {
    server diariolx-seaweed-s3:8333;
  }

  server {
    listen 8180;

    root /usr/share/nginx/html;
    index index.html;

    #
    # Backoffice & authentication (never cached)
    #
    location ^~ /api/backoffice {
      add_header Cache-Control "no-store" always;
      proxy_pass http://jvm-dynamic;
    }

    location ^~ /api/auth {
      add_header Cache-Control "no-store" always;
      proxy_pass http://jvm-dynamic;
    }

    #
    # Public API
    #
    location /api {
      proxy_cache api_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 30s;

      add_header X-Cache-Status $upstream_cache_status always;
      add_header Cache-Control "public, max-age=300" always;

      proxy_pass http://jvm-dynamic;
    }

    #
    # Media (SeaweedFS)
    #
    location ^~ /media/ {
      proxy_cache media_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 30d;
      proxy_cache_valid 404 1m;

      add_header X-Cache-Status $upstream_cache_status always;
      add_header Cache-Control "public, max-age=2592000, immutable" always;

      proxy_pass http://seaweed-s3;

      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass_request_headers on;
    }

    #
    # Swagger / OpenAPI
    #
    location /docs {
      add_header Cache-Control "no-store" always;
      proxy_pass http://jvm-dynamic;
    }

    location /v3/api-docs {
      add_header Cache-Control "no-store" always;
      proxy_pass http://jvm-dynamic;
    }

    #
    # Static assets
    #
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable" always;
      try_files $uri =404;
    }

    #
    # SPA entry point
    #
    location / {
      add_header Cache-Control "no-cache" always;
      try_files $uri $uri/ /index.html;
    }
  }
}